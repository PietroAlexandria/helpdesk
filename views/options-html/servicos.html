<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serviços - CedNet Helpdesk</title>
    <link rel="icon" href="/images/LogoCedNet.ico">
    <link rel="stylesheet" href="/css/servicos.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="layout-with-history">
        <div class="container">
            <div class="page-header">
                <a href="/" class="btn-back">← Voltar</a>
                <h1 class="page-title">🧰 Mudança de Cômodo/Passagem de Cabo</h1>
            </div>

        <!-- Coleta de Dados -->
            <div class="card">
                <p class="card-title">Coleta de Dados</p>

                <div class="field">
                    <label class="field-subtitle">Via de Contato</label>
                    <div class="radio-group">
                        <label class="radio-btn"><input type="radio" name="via" value="Central"><span>Central</span></label>
                        <label class="radio-btn"><input type="radio" name="via" value="OPA"><span>OPA! Suite</span></label>
                    </div>
                </div>

                <hr class="sep">

                <div class="field">
                    <label>Nome do Solicitante</label>
                    <input type="text" name="nome" placeholder="Ex: Pietro de Alexandria Picoli">
                </div>

                <div class="field">
                    <label>Contato</label>
                    <input type="text" name="contato" placeholder="Ex: (XX) XXXXX-XXXX" maxlength="15" oninput="mascaraContato(this)">
                </div>

                <div class="field">
                    <label class="field-subtitle">Tipo de Serviço</label>
                    <div class="radio-group">
                        <label class="radio-btn"><input type="radio" name="tipoServico" value="comodo" onchange="tipoDeServico(this)"><span>Mudança de Cômodo</span></label>
                        <label class="radio-btn"><input type="radio" name="tipoServico" value="passagem" onchange="tipoDeServico(this)"><span>Passagem de Cabo</span></label>
                    </div>
                </div>

                <div class="btn-group">
                    <button class="btn-copy" onclick="copiarColetaDados(this)">📋 Copiar Coleta</button>
                    <button class="btn-clear" onclick="limparColeta()">🗑️ Limpar</button>
                </div>
            </div>

            <div class="card" id="card-mudanca-comodo">
                <p class="card-title">Mudança de Cômodo</p>

                <div class="field">
                    <label>Observações (Opcional)</label>
                    <textarea name="descricao" rows="4" placeholder="Digite aqui suas observações..."></textarea>
                </div>

                <div class="field">
                    <label>Login PPPoE</label>
                    <input type="text" name="loginpppoe-comodo" id="loginpppoe-comodo" placeholder="Ex: 123Pietro"> <br>
                    <label>Senha PPPoE</label>
                    <input type="text" name="senhapppoe-comodo" id="senhapppoe-comodo" placeholder="Ex: 456Pietro"> <br>
                </div>
            </div>

            <div class="card" id="card-passagem-cabo">
                <p class="card-title">Passagem de Cabo</p>

                <div class="field">
                    <label>Observações (Opcional)</label>
                    <textarea name="descricao" rows="4" placeholder="Digite aqui suas observações..."></textarea>
                </div>

                <div class="field">
                    <label>Login PPPoE</label>
                    <input type="text" name="loginpppoe-passagem" id="loginpppoe-passagem" placeholder="Ex: 123Pietro"> <br>
                    <label>Senha PPPoE</label>
                    <input type="text" name="senhapppoe-passagem" id="senhapppoe-passagem" placeholder="Ex: 456Pietro"> <br>
                </div>
            </div>

            <!-- Watermark ------------------------------------------------------------------------------------------------------------------------------->
            <div class="card">
                <div class="watermark">Desenvolvido por Pietro de Alexandria Picoli — <a href="https://github.com/PietroAlexandria" target="_blank">GitHub</a></div>
            </div>
        </div>

        <div class="history-container">
            <div class="history-header">
                <span>📋 Histórico</span>
                <button onclick="limparHistorico()">Limpar tudo</button>
            </div>
            <div class="history-content" id="history-panel"></div>
        </div>
    </div>
    
    <script src="/js/sharedFunctions/functionMostrarAlerta.js" ></script>
    <script src="/js/sharedFunctions/functionToggleCards.js"   ></script>
    <script src="/js/sharedFunctions/functionContact.js"       ></script>
    <script src="/js/sharedFunctions/functionAddContact.js"    ></script>
    <script src="/js/options-js/servicos.js"                   ></script>
    <script src="/js/sharedFunctions/functionCardHistory.js"   ></script>
    <div id="toast" class="toast"></div>
</body>
</html>
