<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conexão Lenta - CedNet Helpdesk</title>
    <link rel="icon" href="/images/LogoCedNet.ico">
    <link rel="stylesheet" href="/css/conexao-lenta.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="page-header">
            <a href="/" class="btn-back">← Voltar</a>
            <h1 class="page-title">🐢 Conexão Lenta</h1>
        </div>

    <!-- Coleta de Dados -->
        <div class="card">
            <p class="card-title">Coleta de Dados</p>

            <div class="field">
                <label class="field-subtitle">Via de Contato</label>
                <div class="radio-group">
                    <label class="radio-btn"><input type="radio" name="via" value="Central"><span>Central</span></label>
                    <label class="radio-btn"><input type="radio" name="via" value="OPA"><span>OPA! Suite</span></label>
                </div>
            </div>

            <hr class="sep">

            <div class="field">
                <label>Nome do Solicitante</label>
                <input type="text" name="nome" placeholder="Ex: Pietro de Alexandria Picoli">
            </div>

            <div class="field">
                <label>Contato</label>
                <input type="text" name="contato" placeholder="Ex: (XX) XXXXX-XXXX" maxlength="15" oninput="mascaraContato(this)">
            </div>
        </div>

        <div class="card">
            <div class="field">
                <label class="field-subtitle">Reincidência?</label>
                <div class="radio-group">
                    <label class="radio-btn"><input type="radio" name="area" value="Sim"><span>Sim</span></label>
                    <label class="radio-btn"><input type="radio" name="area" value="Nao"><span>Não</span></label>
                </div>
            </div>
            <div class="field">
                <button class="btn-copy" onclick="copiarColetaDados(this)">📋 Copiar Coleta</button>
            </div>
        </div>

        <!-- Watermark ------------------------------------------------------------------------------------------------------------------------------->
        <div class="card">
                <div class="watermark">Desenvolvido por Pietro de Alexandria Picoli — <a href="https://github.com/PietroAlexandria" target="_blank">GitHub</a></div>
        </div>
    </div>
    
    <script src="/js/sharedFunctions/functionMostrarAlerta.js" ></script>
    <script src="/js/sharedFunctions/functionToggleCards.js"   ></script>
    <script src="/js/sharedFunctions/functionContact.js"       ></script>
    <script src="/js/sharedFunctions/functionAddContact.js"    ></script>
    <script src="/js/options-js/conexao-lenta.js"              ></script>
    <div id="toast" class="toast"></div>
</body>
</html>
