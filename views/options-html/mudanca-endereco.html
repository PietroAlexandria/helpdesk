<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mudança de Endereço - CedNet Helpdesk</title>
    <link rel="icon" href="/images/LogoCedNet.ico">
    <link rel="stylesheet" href="/css/mudanca-endereco.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">

        <div class="page-header">
            <a href="/" class="btn-back">← Voltar</a>
            <h1 class="page-title">📦 Mudança de Endereço</h1>
        </div>

        <!-- Coleta de Dados -->
        <div class="card">
            <p class="card-title">Coleta de Dados</p>

            <div class="field">
                <label>Via de Contato</label>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="via" value="Central"> Central</label>
                    <label class="radio-label"><input type="radio" name="via" value="OPA"> OPA! Suite</label>
                </div>
            </div>

            <hr class="sep">

            <div class="field">
                <label>Nome do Solicitante</label>
                <input type="text" name="nome" placeholder="Ex: Pietro de Alexandria Picoli">
            </div>

            <div class="field">
                <label>Contato</label>
                <input type="text" name="contato" placeholder="Ex: (XX) XXXXX-XXXX" maxlength="15" oninput="mascaraContato(this)">
            </div>
        </div>

        <!-- Área -->
        <div class="card">
            <p class="card-title">Área</p>
            <div class="field">
                <label>Selecione a Área</label>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="area" value="Urbana" onchange="toggleCards(this.value, { Urbana: 'card-urbana', Rural: 'card-rural' })"> Urbana</label>
                    <label class="radio-label"><input type="radio" name="area" value="Rural" onchange="toggleCards(this.value, { Urbana: 'card-urbana', Rural: 'card-rural' })"> Rural</label>
                </div>
            </div>
        </div>

        <!-- Card Urbana -->
        <div class="card" id="card-urbana" style="display:none">
            <p class="card-title">Mudança de Endereço - Urbana</p>
            
            <div class="field">
                <label>Disponibilidade</label>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="disponibilidade-urbana" value="manha" onchange="horarioEspecifico(this)"> Manhã</label>
                    <label class="radio-label"><input type="radio" name="disponibilidade-urbana" value="tarde" onchange="horarioEspecifico(this)"> Tarde</label>
                    <label class="radio-label"><input type="radio" name="disponibilidade-urbana" value="qualquerHoraio" onchange="horarioEspecifico(this)"> Qualquer Horário</label>
                    <label class="radio-label"><input type="radio" name="disponibilidade-urbana" value="horario-especifico" onchange="horarioEspecifico(this)"> Horário Específico</label>
                </div>
                <div class="field" id="horario-especifico-urbana" style="display:none">
                    <label>Informe o Horário</label>
                    <input type="text" name="horario" placeholder="Ex: Após às 18h">
                </div>
            </div>
        </div>

        <!-- Card Rural -->
        <div class="card" id="card-rural" style="display:none">
            <p class="card-title">Mudança de Endereço - Rural</p>
            
            <div class="field">
                <label>Disponibilidade</label>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="disponibilidade-rural" value="manha" onchange="horarioEspecifico(this)"> Manhã</label>
                    <label class="radio-label"><input type="radio" name="disponibilidade-rural" value="tarde" onchange="horarioEspecifico(this)"> Tarde</label>
                    <label class="radio-label"><input type="radio" name="disponibilidade-rural" value="qualquerHoraio" onchange="horarioEspecifico(this)"> Qualquer Horário</label>
                    <label class="radio-label"><input type="radio" name="disponibilidade-rural" value="horario-especifico" onchange="horarioEspecifico(this)"> Horário Específico</label>
                </div>
                <div class="field" id="horario-especifico-rural" style="display:none">
                    <label>Informe o Horário</label>
                    <input type="text" name="horario" placeholder="Ex: Após às 18h">
                </div>
            </div>
            
        </div>

    </div>
    <script>
        function horarioEspecifico(el) {
            const area = el.name.includes('urbana') ? 'urbana' : 'rural';
            document.getElementById('horario-especifico-' + area).style.display = el.value === 'horario-especifico' ? 'block' : 'none';
        }
    </script>
    <script src="/js/sharedFunctions/functionToggleCards.js"></script>
    <script src="/js/sharedFunctions/functionContact.js"></script>
</body>
</html>
